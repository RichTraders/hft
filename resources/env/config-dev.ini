[auth]
md_address = fix-md.testnet.binance.vision
oe_address = fix-oe.testnet.binance.vision
port = 9000

md_ws_path = /stream?streams=btcusdt@depth/btcusdt@aggTrade

[log]
level = DEBUG
size = 10245760

[exchange]
md_api_host = testnet.binancefuture.com
md_stream_host = stream.binancefuture.com
md_api_endpoint_path = /ws-fapi/v1?returnRateLimits=false
exchange_info_url = https://testnet.binancefuture.com/fapi/v1/exchangeInfo
md_port = 443
md_use_ssl = 1

oe_api_host = testnet.binancefuture.com
oe_api_endpoint_path = /ws-fapi/v1?returnRateLimits=false
oe_stream_host = stream.binancefuture.com
oe_stream_endpoint_path = /ws
oe_port = 443
oe_use_ssl = 1
keepalive_minutes = 58

[orders]
min_replace_qty_delta = 1e-5
min_replace_tick_delta = 50
# 6s
ttl_reserved_ns = 6,000,000,000
# 3.5s
ttl_live_ns = 3,500,000,000

[inventory]
skew_coefficient = 0.001
target_position = 0.0

[main_init]
mud_pool_size = 2048
md_pool_size = 65536
response_memory_size = 1024

[cpu_info]
clock = 3.6e9
interval = 6

[cpu_id]
use_cpu_group = 1
use_cpu_to_tid = 1
count = 5

[thread]
count = 5

[cpu_0]
use_irq = 0
cpu_type = 0

[cpu_1]
use_irq = 0
cpu_type = 0

[cpu_2]
use_irq = 0
cpu_type = 0

[cpu_3]
use_irq = 0
cpu_type = 0

[cpu_4]
use_irq = 0
cpu_type = 0

[thread_0]
name = MDWrite
cpu_id = 0
prio = 40
nicev = -10

[thread_1]
name = MDRead
cpu_id = 0
prio = 60
nicev = -20

[thread_2]
name = OERead
cpu_id = 1
prio = 50
nicev = -20

[thread_3]
name = TradeEngine
cpu_id = 2
prio = 99
nicev = -20

[thread_4]
name = Logger
cpu_id = 3
prio = 50
nicev = -10
